spring:
  application:
    name: erp-organization
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/erp_organization
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/modu-erp}

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
  realm: ${KEYCLOAK_REALM:modu-erp}
  admin:
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

openfga:
  api-url: ${OPENFGA_API_URL:http://localhost:8090}
  store-id: ${OPENFGA_STORE_ID:}
  authorization-model-id: ${OPENFGA_MODEL_ID:}

erp:
  admin:
    username: ${ERP_ADMIN_USERNAME:admin}
    password: ${ERP_ADMIN_PASSWORD:admin}

server:
  port: 8081
