global:
  namespace: modu-erp-staging

keycloak:
  issuerUri: "https://keycloak.staging.example.com/realms/modu-erp"

database:
  host: "postgres.staging.example.com"
  port: 5432
  username: "erp_user"
  # password: set via --set or external secret

gateway:
  replicaCount: 1
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3

organization:
  replicaCount: 1
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3

vacation:
  replicaCount: 1

db-manager:
  replicaCount: 1

kerberos:
  replicaCount: 1
